<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Stripe | Sottile Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">

</head>

<body>

<header>

    <div class="logo">

        <h2>Sottile</h2>

        <span>STORE</span>

    </div>

    <nav>

        <a href="../index.html">Home</a>

        <a href="#">Shop</a>

        <a href="#">About</a>

        <a href="#">Contact</a>

    </nav>

    <div class="header-right">

        <button class="lang-btn">
            AR | EN
        </button>

       <a href="../cart.html" class="cart-btn">
    🛒
    <span id="cart-count">0</span>
</a>

    </div>

</header>

<main class="product-page">

    <div class="breadcrumb">

        <a href="../index.html">Home</a> /

        <span>Flats</span> /

        <strong>Stripe</strong>

    </div>

    <section class="product-details">

        <div class="product-image">

            <img id="main-image" src="../images/stripe-b.jpeg" alt="Stripe">

        </div>

        <div class="product-info">

            <span class="collection-badge">

                Flats

            </span>

            <h1>Stripe</h1>

            <p class="product-code">

                Code:
                <span id="product-code">FL001-B</span>

            </p>

            <h2 class="price">

                499 جنيه

            </h2>

            <div class="color-section">

                <h3>اللون</h3>

                <div class="color-options">

                    <button class="color active"
                        data-image="../images/stripe-b.jpeg"
                        data-code="FL001-B"
                        style="background:#2f5fa8;">
                    </button>

                    <button class="color"
                        data-image="../images/stripe-k.jpeg"
                        data-code="FL001-K"
                        style="background:#111111;">
                    </button>

                    <button class="color"
                        data-image="../images/stripe-p.jpeg"
                        data-code="FL001-P"
                        style="background:#f3b6cf;">
                    </button>

                </div>

            </div>

            <div class="size-section">

                <h3>المقاس</h3>

                <div class="sizes">

                    <button class="size-btn active-size">37</button>
                    <button class="size-btn">38</button>
                    <button class="size-btn">39</button>
                    <button class="size-btn">40</button>
                    <button class="size-btn">41</button>

                </div>

            </div>

            <div class="quantity">

                <h3>الكمية</h3>

                <div class="qty-box">

                    <button id="minus">-</button>

                    <span id="qty">1</span>

                    <button id="plus">+</button>

                </div>

            </div>
            <button class="add-cart"
                data-name="stripe"
                data-price="499">

                إضافة إلى السلة

            </button>

            <div class="shipping-info">

                <p>🚚 شحن لجميع المحافظات</p>
                <p>⭐ خامات عالية الجودة</p>
                <p>⏳ الاستلام خلال أسبوع من الطلب</p>
                <p>📦 معاينة قبل الاستلام</p>

            </div>

        </div>

    </section>

</main>

<script src="../script.js"></script>

</body>
</html>
